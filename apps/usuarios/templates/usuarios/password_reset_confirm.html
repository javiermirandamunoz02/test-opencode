{% extends "base.html" %}
{% block full_content %}
<div class="login-page">
  <div class="card login-card">
    <div class="card-body text-center">
      <i class="bi bi-key login-icon mb-3"></i>
      <h4 class="fw-bold mb-2">Nueva Contraseña</h4>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3 text-start">
          <label class="form-label fw-semibold">Nueva contraseña</label>
          <input type="password" name="new_password1" class="form-control" required minlength="6">
        </div>
        <div class="mb-3 text-start">
          <label class="form-label fw-semibold">Confirmar</label>
          <input type="password" name="new_password2" class="form-control" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary w-100">Cambiar Contraseña</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
