{% extends "base.html" %}
{% block full_content %}
<div class="login-page">
  <div class="card login-card">
    <div class="card-body text-center">
      <i class="bi bi-lock login-icon mb-3"></i>
      <h4 class="fw-bold mb-2">Recuperar Contraseña</h4>
      <p class="text-muted small mb-4">Ingresá tu email y te enviaremos instrucciones</p>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3 text-start">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-2">Enviar</button>
      </form>
      <a href="{% url 'login' %}" class="small text-decoration-none">Volver al login</a>
    </div>
  </div>
</div>
{% endblock %}
