{% extends "base.html" %}
{% block title %}Nueva Asignación{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><h4><i class="bi bi-person-plus me-2"></i>Nueva Asignación</h4></div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Profesor</label>
                <select name="profesor" class="form-select" required>
                    <option value="">Seleccionar profesor...</option>
                    {% for p in profesores %}
                        <option value="{{ p.pk }}">{{ p }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Curso</label>
                <select name="curso" class="form-select" required>
                    <option value="">Seleccionar curso...</option>
                    {% for c in cursos %}
                        <option value="{{ c.pk }}">{{ c }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Asignatura</label>
                <select name="asignatura" class="form-select" required>
                    <option value="">Seleccionar asignatura...</option>
                    {% for a in asignaturas %}
                        <option value="{{ a.pk }}">{{ a.nombre }} ({{ a.curso }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Asignar</button>
                <a href="{% url 'asignacion_list' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
