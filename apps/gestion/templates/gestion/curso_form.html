{% extends "base.html" %}
{% block title %}{% if editar %}Editar{% else %}Nuevo{% endif %} Curso{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h4><i class="bi bi-{% if editar %}pencil{% else %}plus-circle{% endif %} me-2"></i>{% if editar %}Editar{% else %}Nuevo{% endif %} Curso</h4>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" name="nombre" class="form-control" value="{{ curso.nombre|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Año</label>
                <input type="number" name="anio" class="form-control" value="{{ curso.anio|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3">{{ curso.descripcion|default:'' }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i> {% if editar %}Actualizar{% else %}Crear{% endif %}
                </button>
                <a href="{% url 'curso_list' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
