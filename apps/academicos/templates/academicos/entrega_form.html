{% extends "base.html" %}
{% block title %}Entregar Tarea{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><h4><i class="bi bi-upload me-2"></i>Entregar Tarea</h4></div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Tarea</label>
                <select name="tarea" class="form-select" required>
                    <option value="">Seleccionar tarea...</option>
                    {% for t in tareas %}
                        <option value="{{ t.pk }}">{{ t.titulo }} — {{ t.asignatura.nombre }} (Entrega: {{ t.fecha_entrega|date:"d/m/Y" }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Archivo (opcional)</label>
                <input type="file" name="archivo" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Observación</label>
                <textarea name="observacion" class="form-control" rows="2" placeholder="Nota o comentario para el profesor..."></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Entregar</button>
                <a href="{% url 'tarea_list' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
